name: mindsafe
description: A secure mental health and mood tracking app that prioritizes privacy, security, and beautiful UI.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management & routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # Models & serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.5

  # Local encrypted storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2

  # Auth & biometrics
  local_auth: ^2.2.0
  crypto: ^3.0.3
  uuid: ^4.4.0

  # UI & charts
  fl_chart: ^0.68.0
  animations: ^2.0.11
  lottie: ^3.1.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  smooth_page_indicator: ^1.2.0
  shimmer: ^3.0.0

  # Utilities
  intl: any
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  audioplayers: ^6.0.0
  share_plus: ^9.0.0
  url_launcher: ^6.3.0
  collection: ^1.18.0
  timeago: ^3.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1
  mockito: ^5.4.4
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/
    - assets/sounds/
    - assets/data/
